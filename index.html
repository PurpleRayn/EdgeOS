<script type="text/plain" id="app-source">
/* ═══════════════════════════════════════════════════════════════════
   EDGE OS — a cognitive operating system for discretionary decisions
   Bolt Edition · single-file PWA · React 18 · offline-ready
   ═══════════════════════════════════════════════════════════════════
   ONE FRAMEWORK · FIVE DOMAINS — everything below belongs to exactly one:

   SUBSTRATE    the ledger. Every fact is an appended event; all state is
                derived, never entered. (storage · time · ledger engine)
   PERCEPTION   what the market is. SPY regime · the open stack (TWO
                weighted / TDO+NYO entry / TMO context) · levels · the
                quarterly clock · news. (pdStackOf · qtOf · levelsOf ·
                econ · MARKET screen)
   ORIENTATION  what it means for you. The sealed contract · the verdict.
                (BRIEF/ORIENT · verdictOf)
   DECISION     the Gate. Seven stages, one live quality number, TAKE or
                PASS — both recorded. (alignmentOf · qualityOf · sizer)
   EXECUTION    the live trade and its guardrails. R-cockpit · cooldowns ·
                circuit breakers as an OS state. (EXECUTE · LOCKOUT)
   LEARNING     the loop closes. Debrief · reflection · periods · stats ·
                broker truth. (insights · periodStats · reconcile · LEARN)

   The mission screen walks the loop left to right, every day:
   PERCEIVE → ORIENT → DECIDE → EXECUTE → LEARN.                          */
const LOOP=["PERCEIVE","ORIENT","DECIDE","EXECUTE","LEARN"];
const MODE_LABEL={BRIEF:"ORIENT",HUNT:"DECIDE",EXECUTE:"EXECUTE",LOCKOUT:"LOCKOUT",DEBRIEF:"LEARN"};
function loopPhaseOf(nav,mode){
  if(nav==="market")return"PERCEIVE";
  if(nav==="review")return"LEARN";
  if(nav==="system")return null;
  return mode==="BRIEF"?"ORIENT":mode==="HUNT"?"DECIDE":mode==="EXECUTE"?"EXECUTE":"LEARN";
}

const {useState,useEffect,useMemo,useRef}=React;

/* ════ DESIGN TOKENS — LA CHARGERS BOLT THEME ════ */
const mono="'JetBrains Mono',ui-monospace,monospace";
const sans="'Inter',-apple-system,sans-serif";
const disp="'Chakra Petch','Inter',sans-serif";
const C={
  bg:"#020A14",bg2:"#041020",panel:"#081627",panel2:"#0C1F38",panel3:"#102A4A",
  border:"#14304F",borderHi:"#1E4470",faint:"#0A1C33",
  powder:"#0080C6",powderHi:"#28A5E8",ice:"#8FD4FF",
  bolt:"#FFC20E",boltHi:"#FFD75E",
  white:"#F2F8FF",text:"#E7F1FB",textDim:"#B9CFE4",muted:"#6C8BAC",dim:"#3B587A",
  win:"#2EE6A6",loss:"#FF4D5E",warn:"#FFC20E",
};
const REGIMES=[
  {v:"neg",l:"NEGATIVE GEX",short:"NEG GEX",color:C.win,mode:"AMPLIFIER",env:"TRENDING",
   note:"Dealers fuel momentum. Targets run."},
  {v:"flip",l:"AT GAMMA FLIP",short:"AT FLIP",color:C.bolt,mode:"TRANSITIONING",env:"UNCERTAIN",
   note:"Unstable. Wait for acceptance."},
  {v:"pos",l:"POSITIVE GEX",short:"POS GEX",color:C.loss,mode:"DAMPENER",env:"RANGING",
   note:"Dealers absorb. Chop builds the setup."},
];
const regimeOf=v=>REGIMES.find(r=>r.v===v)||REGIMES[0];
const DIRS=[{v:"long",l:"LONGS ONLY",color:C.win},{v:"short",l:"SHORTS ONLY",color:C.loss},
  {v:"either",l:"EITHER — SETUP DECIDES",color:C.powderHi},{v:"none",l:"NO-TRADE DAY",color:C.muted}];
const STATES=[{v:"calm",l:"CALM"},{v:"confident",l:"CONFIDENT"},{v:"rushed",l:"RUSHED"},{v:"bored",l:"BORED"},{v:"tilted",l:"TILTED"}];
const PASS_REASONS=["Quality < 8","No sweep","At the flip","Positive GEX","Chop / unclear","TFC fought it","Against declaration"];
const OVERRIDE_SENTENCE="I am choosing to break my own circuit breaker";
const COOLDOWN_MS=15*60*1000;
const GATE_STAGES=[
  {k:"liq",n:"01",title:"LIQUIDITY BUILT",sub:"Equal highs / lows form",auto:false,needPrice:false,
   opts:["Equal highs","Equal lows","Both sides"]},
  {k:"sweep",n:"02",title:"LIQUIDITY SWEPT",sub:"Stops taken — stamp the price",auto:false,needPrice:true,
   opts:["Swept highs","Swept lows"]},
  {k:"pda",n:"03",title:"HTF PDA ARRAY",sub:"OB or FVG at the level",auto:false,needPrice:true,
   opts:["Order Block","FVG"]},
  {k:"strat",n:"04",title:"STRAT PATTERN · 15M",sub:"2-2 reversal, forming live",auto:false,needPrice:false,
   opts:["2-2 Reversal","2-1-2","3-1-2","Other Strat"]},
  {k:"tfc",n:"05",title:"FTFC — H · 4H · D · W · M · Q",sub:"▲ above · ▼ below · IN inside each open",auto:false,needPrice:false,opts:[]},
  {k:"tdo",n:"06",title:"TRUE OPEN GAUGE",sub:"Premium = shorts · discount = longs",auto:true,needPrice:true,opts:[]},
  {k:"rr",n:"07",title:"TARGET · OPPOSING LIQ",sub:"Entry · stop · exit — 1:2 minimum",auto:true,needPrice:false,opts:[]},
];

/* ════ STORAGE — append-only ledger + settings ════ */
const PFX="edgeos:";
const lsGet=(k,d)=>{try{const v=localStorage.getItem(PFX+k);return v?JSON.parse(v):d;}catch(_){return d;}};
const lsSet=(k,v)=>{try{localStorage.setItem(PFX+k,JSON.stringify(v));}catch(_){}};
const loadLedger=()=>lsGet("ledger",[]);
const saveLedger=arr=>lsSet("ledger",arr);
const loadSettings=()=>({riskPerTrade:250,maxDailyLoss:1000,maxTrades:2,qualityFloor:8,ptValue:2,instrument:"MNQ",
  ...lsGet("settings",{})});
const saveSettings=s=>lsSet("settings",s);

/* ════ TIME ════ */
function dateKeyOf(ts){const d=new Date(ts);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function todayKey(){return dateKeyOf(Date.now());}
const fmtT=ts=>new Date(ts).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
const fmtD=k=>{const [y,m,d]=k.split("-").map(Number);return new Date(y,m-1,d).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});};
const money=n=>`${n<0?"−":""}$${Math.abs(Math.round(n)).toLocaleString()}`;
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

/* ════ LEDGER ENGINE — pure derivations, no stored state ════ */
function evOn(ledger,key){return ledger.filter(e=>dateKeyOf(e.ts)===key);}
function lastOf(evs,type){for(let i=evs.length-1;i>=0;i--)if(evs[i].type===type)return evs[i];return null;}
function briefOf(evs){const b=lastOf(evs,"BRIEF_SEALED");return b?b.data:null;}
function openGateOf(evs){
  const g=lastOf(evs,"GATE_OPEN");if(!g)return null;
  const resolved=evs.some(e=>e.type==="DECISION"&&e.data.gateId===g.data.gateId);
  if(resolved)return null;
  const stages={};let quality=null,plan=null;
  evs.forEach(e=>{
    if(e.type==="STAGE_ARMED"&&e.data.gateId===g.data.gateId){stages[e.data.stage]={ts:e.ts,...e.data};if(e.data.plan)plan=e.data.plan;}
  });
  return{gateId:g.data.gateId,openedAt:g.ts,stages,plan};
}
function openTradeOf(evs){
  const t=lastOf(evs,"TRADE_OPENED");if(!t)return null;
  const closed=evs.some(e=>e.type==="TRADE_CLOSED"&&e.data.tradeId===t.data.tradeId);
  return closed?null:{...t.data,openedAt:t.ts};
}
function closedTradesOf(evs){
  const recon={};evs.forEach(e=>{if(e.type==="TRADE_RECONCILED")recon[e.data.tradeId]=e.data;});
  return evs.filter(e=>e.type==="TRADE_CLOSED").map(e=>{
    const r=recon[e.data.tradeId];
    if(!r)return{ts:e.ts,...e.data};
    const pnl=r.pnl!=null?r.pnl:e.data.pnl;
    return{ts:e.ts,...e.data,pnl,outcome:pnl>0?"win":pnl<0?"loss":"be",
      exit:r.exit!=null?r.exit:e.data.exit,r:r.r!=null?r.r:e.data.r,
      fees:r.fees,reconciled:true};});
}
function decisionsOf(evs){return evs.filter(e=>e.type==="DECISION").map(e=>({ts:e.ts,...e.data}));}

function dayStateOf(ledger,settings){
  const key=todayKey(),evs=evOn(ledger,key);
  const brief=briefOf(evs);
  const trades=closedTradesOf(evs);
  const dayPnl=trades.reduce((s,t)=>s+(t.pnl||0),0);
  let consec=0;for(let i=trades.length-1;i>=0;i--){if(trades[i].outcome==="loss")consec++;else break;}
  const takes=decisionsOf(evs).filter(d=>d.action==="TAKE").length;
  const passes=decisionsOf(evs).filter(d=>d.action==="PASS").length;
  const cd=lastOf(evs,"COOLDOWN_START");
  const cooldownUntil=cd?cd.ts+COOLDOWN_MS:0;
  const overridden=evs.some(e=>e.type==="BREAKER_OVERRIDE");
  const debriefed=evs.some(e=>e.type==="DEBRIEF_SIGNED");
  const reasons=[];
  if(consec>=2)reasons.push("Two losses in a row — your rule: close the platform, done for the day.");
  if(settings.maxDailyLoss>0&&dayPnl<=-settings.maxDailyLoss)
    reasons.push(`${money(dayPnl)} on the day — daily loss limit of $${settings.maxDailyLoss.toLocaleString()} hit.`);
  if(brief){
    if(brief.maxTrades>0&&trades.length>brief.maxTrades)
      reasons.push(`Trade count broke the contract — ${trades.length} taken, ${brief.maxTrades} allowed.`);
    if(brief.direction==="none"&&trades.length>0)reasons.push("You traded on a declared NO-TRADE day.");
    if(brief.direction==="long"&&trades.some(t=>t.dir==="short"))reasons.push("SHORT taken on a LONGS-ONLY contract.");
    if(brief.direction==="short"&&trades.some(t=>t.dir==="long"))reasons.push("LONG taken on a SHORTS-ONLY contract.");
  }
  const lockReviewNeeded=trades.filter(t=>t.outcome==="loss"&&!evs.some(e=>e.type==="LOSS_REVIEWED"&&e.data.tradeId===t.tradeId));
  const mk=lastOf(evs,"MARK_SET");
  const mark=mk?mk.data.price:(brief&&brief.spot)||"";
  const nyoEv=lastOf(evs,"NYO_SET");
  const opens=brief?{tmo:brief.tmo,two:brief.two,tdo:brief.tdo,nyo:nyoEv?nyoEv.data.price:""}:null;
  const stack=opens?pdStackOf(mark,opens):null;
  const qt=qtOf(Date.now());
  const verdict=brief?verdictOf(stack,qt,brief.regime):null;
  const levels=levelsOf(evs);
  const econToday=econAllOf(ledger).filter(x=>x.dateKey===key);
  const nextNews=newsStateOf(econToday,Date.now());
  return{key,evs,brief,trades,dayPnl,consec,takes,passes,cooldownUntil,overridden,debriefed,
    reasons,tripped:reasons.length>0&&!overridden,lockReviewNeeded,
    mark,levels,econToday,nextNews,opens,stack,qt,verdict,
    gate:openGateOf(evs),openTrade:openTradeOf(evs)};
}

/* Mode derivation — the app knows what time it is */
function modeOf(ds){
  if(ds.tripped)return"LOCKOUT";
  if(ds.openTrade)return"EXECUTE";
  if(!ds.brief)return"BRIEF";
  return"HUNT";
}

/* ════ QUALITY ENGINE — the auto-grade, moved to pre-mortem ════ */
function qualityOf(brief,gate,dir,ctx){
  if(!brief)return{q:0,why:["No brief sealed"]};
  ctx=ctx||{};
  const armed=gate?Object.keys(gate.stages).length:0;
  let q=armed;const why=[`${armed}/7 stages armed`];
  const rg=brief.regime;
  if(rg==="neg"){q+=1;why.push("SPY negative GEX — fuel (+1)");}
  else if(rg==="flip"){q-=2;why.push("SPY at the flip — unstable (\u22122)");}
  else why.push("SPY positive GEX — context only (+0)");
  /* THE STACK — location, macro-weighted */
  if(ctx.stack&&dir){
    const want=dir==="short"?"premium":"discount";
    if(ctx.stack.full&&ctx.stack.composite===want){q+=2;why.push(`FULL STACK ${want.toUpperCase()} — weekly + entry pair agree (+2)`);}
    else if(ctx.stack.macroSide===want){q+=1;why.push(`Weekly open in ${want} — location holds (+1)`);}
    else if(ctx.stack.macroSide&&ctx.stack.macroSide!=="mixed"){q-=3;why.push(`FIGHTING THE WEEKLY OPEN — TWO says ${ctx.stack.macroSide==="premium"?"shorts":"longs"} (\u22123)`);}
    else{q-=1;why.push("No weekly open set — no clean location (\u22121)");}
  }else if(dir)why.push("No opens set — location unknown");
  /* FTFC — Rob Smith, Q/M/W/D/4H alignment tier */
  if(ctx.tfc&&dir){
    const al=alignmentOf(ctx.tfc,dir);
    if(al&&al.tier==="ELITE"){q+=2;why.push("FTFC ELITE — H/4H/D/W/M/Q all with the trade (+2)");}
    else if(al&&al.tier==="HIGH"){q+=1;why.push(`FTFC HIGH — ${al.effWith}/6 effective continuity (+1)`);}
    else if(al&&al.tier==="MODERATE")why.push(`FTFC MODERATE — ${al.effWith}/6 effective, ${al.against} against (+0)`);
    else if(al&&al.tier==="LOW"){q-=3;why.push(`FTFC LOW — only ${al.effWith}/6 effective continuity (\u22123)`);}
  }
  /* QUARTERLY THEORY — time-of-trade probability */
  if(ctx.qt){
    if(ctx.qt.bias>0){q+=1;why.push(`${ctx.qt.window} window — distribution time (+1)`);}
    else if(ctx.qt.bias<0){q-=1;why.push(`${ctx.qt.window} window — dead time (\u22121)`);}
    else why.push(`${ctx.qt.window} window — ${ctx.qt.role.toLowerCase()} (+0)`);
  }
  if(brief.fourHClear===false)why.push("4H choppy — observation flag");
  if(dir&&brief.direction!=="either"&&brief.direction!=="none"&&dir!==brief.direction){q-=3;why.push("Fights your declaration (\u22123)");}
  if(ctx.newsSoon){q-=2;why.push("High-impact news window (\u22122)");}
  q=Math.max(0,Math.min(10,q));
  return{q,why};
}
const TICK=0.25,TICK_VAL=0.5; // MNQ: 0.25 pt tick = $0.50
const roundTick=p=>Math.round(parseFloat(p)/TICK)*TICK;
function sizerOf(entry,stop,risk,ptValue){
  const en=parseFloat(entry),st=parseFloat(stop);
  if(!en||!st||en===st)return null;
  const stopPts=Math.abs(roundTick(en)-roundTick(st));
  if(!stopPts)return null;
  const perContract=stopPts*ptValue;              // $ risk per 1 MNQ at this stop
  const contracts=Math.floor(risk/perContract);   // whole contracts only — futures
  return{stopPts,perContract,contracts,actualRisk:contracts*perContract};
}
function rrOf(entry,stop,target){
  const en=parseFloat(entry),st=parseFloat(stop),tg=parseFloat(target);
  if(!en||!st||!tg||en===st)return null;
  return Math.abs(tg-en)/Math.abs(en-st);
}

/* ════ TRUE OPENS — THE PREMIUM / DISCOUNT GAUGE ════
   Above the true opens price is PREMIUM: hunt shorts.
   Below them price is DISCOUNT: hunt longs. This gauge feeds the ribbon,
   the Gate's stage 5, the quality engine, and every warning surface.      */
function pdGauge(mark,tdo,two){
  const m=parseFloat(mark),td=parseFloat(tdo),tw=parseFloat(two);
  if(!m||(!td&&!tw))return null;
  const flags=[td?m>td:null,tw?m>tw:null];
  const ups=flags.filter(x=>x===true).length,downs=flags.filter(x=>x===false).length;
  let zone,dirBias,label;
  if(ups&&!downs){zone="premium";dirBias="short";label=ups===2?"DEEP PREMIUM":"PREMIUM";}
  else if(downs&&!ups){zone="discount";dirBias="long";label=downs===2?"DEEP DISCOUNT":"DISCOUNT";}
  else{zone="straddle";dirBias=null;label="STRADDLING THE OPENS";}
  return{mark:m,tdo:td||null,two:tw||null,zone,dirBias,label};
}

/* ════ THE OPEN STACK — TWO (weighted) · TDO + NYO (entry) · TMO (context) ════
   TWO is the probability anchor — above/below it hunts shorts/longs and it
   alone can lock the stack. TDO and NYO are the entry-timing pair for the
   scalp — daily, intraday. TMO is tracked and shown but never gates a
   trade: you can be long above the monthly open if the weekly and the
   entry pair agree. Direction comes from TWO first, entry zone from
   TDO/NYO; TMO is context only.                                            */
const OPEN_DEFS=[
  {k:"tmo",l:"TRUE MONTH OPEN",short:"TMO",scope:"CONTEXT"},
  {k:"two",l:"TRUE WEEK OPEN",short:"TWO",scope:"MACRO"},
  {k:"tdo",l:"TRUE DAY OPEN",short:"TDO",scope:"MICRO"},
  {k:"nyo",l:"NY OPEN · 9:30",short:"NYO",scope:"MICRO"}];
function pdStackOf(mark,opens){
  const m=parseFloat(mark);if(!m||!opens)return null;
  const rows=OPEN_DEFS.map(d=>{const v=parseFloat(opens[d.k]);
    return isNaN(v)?null:{...d,value:v,side:m>v?"premium":m<v?"discount":"at"};}).filter(Boolean);
  if(!rows.length)return null;
  const sideOf=g=>!g.length?null:g.every(r=>r.side==="premium")?"premium":g.every(r=>r.side==="discount")?"discount":"mixed";
  const weekly=rows.filter(r=>r.scope==="MACRO");   // TWO — the weighted anchor
  const entry=rows.filter(r=>r.scope==="MICRO");    // TDO + NYO — scalp timing
  const macroSide=sideOf(weekly);
  const microSide=sideOf(entry);
  const directional=[...weekly,...entry];           // TMO excluded — context only
  const dirSide=sideOf(directional);
  const full=directional.length>=2&&dirSide&&dirSide!=="mixed";
  const composite=full?dirSide:(macroSide&&macroSide!=="mixed")?macroSide:null;
  const dirBias=composite==="premium"?"short":composite==="discount"?"long":null;
  const label=full?`FULL STACK ${composite.toUpperCase()}`
    :(macroSide&&macroSide!=="mixed")?`WEEKLY ${macroSide.toUpperCase()}${microSide&&microSide!=="mixed"&&microSide!==macroSide?" · ENTRY "+microSide.toUpperCase():""}`
    :(microSide&&microSide!=="mixed")?`ENTRY ${microSide.toUpperCase()} · WEEKLY UNSET`
    :"MIXED STACK";
  return{mark:m,rows,macroSide,microSide,full,composite,dirBias,label};
}

/* ════ FTFC ALIGNMENT — Rob Smith, highest timeframe down ════
   The Strat: continuity means the higher-timeframe candles trade WITH you —
   Q, M, W, D, 4H all going your way before a sub-1H entry. This is the BIAS
   engine (calendar candles). The true-open stack is the LOCATION engine
   (Q2 opens). Direction from continuity; entry zone from premium/discount.  */
const TFC_FRAMES=[{k:"h1",l:"H"},{k:"h4",l:"4H"},{k:"d",l:"D"},{k:"w",l:"W"},{k:"m",l:"M"},{k:"q",l:"Q"}];
function alignmentOf(tfc,dir){
  if(!tfc||!dir)return null;
  const full=dir==="long"?"2u":"2d",fullAgainst=dir==="long"?"2d":"2u";
  const lean=dir==="long"?"1g":"1r",leanAgainst=dir==="long"?"1r":"1g";
  let withFull=0,withLean=0,against=0,set=0;
  TFC_FRAMES.forEach(f=>{const v=tfc[f.k];if(!v)return;set++;
    if(v===full)withFull++;
    else if(v===lean)withLean++;
    else if(v===fullAgainst||v===leanAgainst)against++;});
  if(set<TFC_FRAMES.length)return{withFull,withLean,against,set,effWith:withFull+withLean*0.5,tier:"INCOMPLETE"};
  const effWith=withFull+withLean*0.5;
  const tier=effWith>=5.5?"ELITE":effWith>=4.5?"HIGH":effWith>=3?"MODERATE":"LOW";
  return{withFull,withLean,against,set,effWith,tier};
}

/* ════ QUARTERLY THEORY — time is a quarter machine ════
   Day quarters (ET): Q1 Asia 18–00 accumulation · Q2 London 00–06
   manipulation · Q3 NY 06–12 distribution · Q4 PM 12–18 continuation.
   Each quarter subdivides into 90-minute A/M/D/X cycles. The sweep belongs
   to manipulation time; the entry belongs to distribution time.             */
function qtOf(now){
  const d=new Date(now);const h=d.getHours()+d.getMinutes()/60;
  let quarter,role,qStart;
  if(h>=18){quarter="Q1 · ASIA";role="ACCUMULATION";qStart=18;}
  else if(h<6){quarter="Q2 · LONDON";role="MANIPULATION";qStart=0;}
  else if(h<12){quarter="Q3 · NEW YORK";role="DISTRIBUTION";qStart=6;}
  else{quarter="Q4 · PM";role="CONTINUATION / REVERSAL";qStart=12;}
  const mIx=Math.min(3,Math.floor((h-qStart)*60/90));
  const micro=["90M-1 ACCUMULATE","90M-2 MANIPULATE","90M-3 DISTRIBUTE","90M-4 CONTINUE"][mIx];
  let window,bias,note;
  if(h>=9.5&&h<11.5){window="PRIME";bias=1;note="Distribution. Your window.";}
  else if(h>=6&&h<9.5){window="SWEEP";bias=0;note="Judas hour. Stalk, don't chase.";}
  else if(h>=11.5&&h<13.5){window="CHOP";bias=-1;note="Lunch. Moves fail.";}
  else if(h>=13.5&&h<15.75){window="PM DRIVE";bias=0;note="Second drive. Faster, thinner.";}
  else{window="OFF";bias=-1;note="Session closed.";}
  return{quarter,role,micro,window,bias,note};
}

/* ════ THE VERDICT — the anti-forcing surface ════ */
function verdictOf(stack,qt,regime){
  if(!stack)return{code:"SET",label:"SET THE OPENS",color:C.muted,
    note:"Set TMO · TWO · TDO · NYO."};
  if(!stack.dirBias)return{code:"STAND_DOWN",label:"STAND DOWN — MIXED STACK",color:C.loss,
    note:"Opens disagree. Not clear, not there."};
  if(qt.window==="OFF"||qt.window==="CHOP")return{code:"STAND_DOWN",label:"STAND DOWN — DEAD TIME",color:C.loss,note:qt.note};
  const hunt=stack.dirBias==="short"?"SHORTS":"LONGS";
  if(stack.full&&qt.window==="PRIME"&&regime==="neg")
    return{code:"APLUS",label:`A+ WINDOW — HUNT ${hunt}`,color:C.win,
      note:"Full stack · prime time · fuel."};
  if(qt.window==="SWEEP")return{code:"STALK",label:`STALK ${hunt} — SWEEP WINDOW`,color:C.bolt,
    note:"Let the stops run first."};
  return{code:"HUNT",label:`HUNT ${hunt}`,color:C.powderHi,note:qt.note};
}

/* ════ BROKER SYNC — TOPSTEPX CSV → CALIBRATED TRUTH ════
   Two formats auto-detected:
   · TRADES export (round-trips: EnteredAt/ExitedAt/EntryPrice/ExitPrice/PnL/Size/Type)
   · FILLS/ORDERS export (Side/Qty/Price/Time) → FIFO-reconstructed into round trips
   Reconciled against the ledger: CONFIRMED · ADJUSTED (broker P&L wins) ·
   IMPORTED (in CSV, not in ledger) · FLAGGED (in ledger, not at the broker).   */
function parseCsvText(text){
  const rows=[];let row=[],cell="",inQ=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(inQ){if(ch==='"'){if(text[i+1]==='"'){cell+='"';i++;}else inQ=false;}else cell+=ch;}
    else if(ch==='"')inQ=true;
    else if(ch===","){row.push(cell);cell="";}
    else if(ch==="\n"||ch==="\r"){if(ch==="\r"&&text[i+1]==="\n")i++;
      row.push(cell);cell="";if(row.some(c=>c.trim()!==""))rows.push(row);row=[];}
    else cell+=ch;}
  row.push(cell);if(row.some(c=>c.trim()!==""))rows.push(row);
  return rows;
}
const _norm=h=>String(h||"").toLowerCase().replace(/[^a-z0-9]/g,"");
function colOf(headers,names){
  const H=headers.map(_norm);
  for(const n of names){const i=H.findIndex(h=>h.includes(n));if(i>=0)return i;}
  return -1;
}
function parseWhen(v){const t=new Date(v).getTime();return isNaN(t)?null:t;}
function buildTradesFromCsv(text,settings){
  const rows=parseCsvText(text);
  if(rows.length<2)return{trades:[],mode:"empty",skipped:0};
  const H=rows[0],data=rows.slice(1);
  const sym=colOf(H,["contractname","symbol","contract","instrument","product"]);
  const isMnq=r=>sym<0||_norm(r[sym]).includes("mnq");
  let skipped=0;const trades=[];
  const entP=colOf(H,["entryprice"]),extP=colOf(H,["exitprice"]);
  if(entP>=0&&extP>=0){ /* MODE A — round-trip trades export */
    const size=colOf(H,["size","qty","quantity"]),type=colOf(H,["type","side","direction"]);
    const entT=colOf(H,["enteredat","entrytime","opened"]),extT=colOf(H,["exitedat","exittime","closed"]);
    const pnlC=colOf(H,["pnl","profit","netpl","realized"]),feeC=colOf(H,["fees","fee","commission"]);
    data.forEach(r=>{
      if(!isMnq(r)){skipped++;return;}
      const entry=parseFloat(r[entP]),exit=parseFloat(r[extP]);
      const qty=Math.abs(parseFloat(size>=0?r[size]:1))||1;
      const dir=_norm(type>=0?r[type]:"").includes("s")&&!_norm(r[type]).includes("long")?"short":
        _norm(type>=0?r[type]:"").includes("long")||_norm(type>=0?r[type]:"")==="buy"||_norm(type>=0?r[type]:"")==="b"?"long":
        exit<entry?"short":"long"; /* last-resort guess only if type column missing */
      const entryTs=entT>=0?parseWhen(r[entT]):null,exitTs=extT>=0?parseWhen(r[extT]):null;
      if(isNaN(entry)||isNaN(exit)||!exitTs&&!entryTs){skipped++;return;}
      const fees=feeC>=0?Math.abs(parseFloat(r[feeC])||0):0;
      let pnl=pnlC>=0?parseFloat(String(r[pnlC]).replace(/[$,()]/g,m=>m==="("?"-":"")):NaN;
      if(isNaN(pnl))pnl=(exit-entry)*(dir==="long"?1:-1)*qty*settings.ptValue-fees;
      trades.push({dir,entry,exit,size:qty,pnl:Math.round(pnl*100)/100,fees,
        entryTs:entryTs||exitTs,exitTs:exitTs||entryTs,src:"trades"});});
    return{trades,mode:"trades",skipped};
  }
  /* MODE B — fills → FIFO */
  const side=colOf(H,["side","buysell","action","bs"]),price=colOf(H,["fillprice","price","avgprice"]);
  const qtyC=colOf(H,["filledqty","qty","quantity","size","filled"]);
  const timeC=colOf(H,["filltime","executed","timestamp","time","date"]);
  if(side<0||price<0||timeC<0)return{trades:[],mode:"unknown",skipped:data.length};
  const fills=[];
  data.forEach(r=>{
    if(!isMnq(r)){skipped++;return;}
    const p=parseFloat(r[price]),q=Math.abs(parseFloat(qtyC>=0?r[qtyC]:1))||1,ts=parseWhen(r[timeC]);
    const sv=_norm(r[side]);
    const buy=sv.startsWith("b")||sv.includes("buy")||sv.includes("long");
    const sell=sv.startsWith("s")||sv.includes("sell")||sv.includes("short");
    if(isNaN(p)||!ts||(!buy&&!sell)){skipped++;return;}
    fills.push({ts,price:p,qty:q,sign:buy?1:-1});});
  fills.sort((a,b)=>a.ts-b.ts);
  const lots=[]; /* open position lots, signed */
  fills.forEach(f=>{
    let qty=f.qty;
    while(qty>0&&lots.length&&lots[0].sign!==f.sign){ /* closing against FIFO */
      const lot=lots[0];const m=Math.min(qty,lot.qty);
      const dir=lot.sign>0?"long":"short";
      const pnl=(f.price-lot.price)*lot.sign*m*settings.ptValue;
      trades.push({dir,entry:lot.price,exit:f.price,size:m,pnl:Math.round(pnl*100)/100,fees:0,
        entryTs:lot.ts,exitTs:f.ts,src:"fifo"});
      lot.qty-=m;qty-=m;if(lot.qty===0)lots.shift();}
    if(qty>0)lots.push({ts:f.ts,price:f.price,qty,sign:f.sign});});
  return{trades,mode:"fifo",skipped,openLots:lots.reduce((s,l)=>s+l.qty,0)};
}
function reconcileCsv(ledger,csvTrades,settings){
  const lts=ledger.filter(e=>e.type==="TRADE_CLOSED").map(e=>({ts:e.ts,...e.data}))
    .filter(t=>!t.imported);
  const recon={};ledger.forEach(e=>{if(e.type==="TRADE_RECONCILED")recon[e.data.tradeId]=e.data;});
  const used=new Set();const matches=[];const missing=[];
  csvTrades.forEach(ct=>{
    const key=dateKeyOf(ct.exitTs||ct.entryTs);
    let best=null,bestScore=Infinity;
    lts.forEach(t=>{
      if(used.has(t.tradeId)||dateKeyOf(t.ts)!==key||t.dir!==ct.dir)return;
      const dp=Math.abs((t.entry||0)-ct.entry);
      if(dp>40)return; /* not the same trade */
      const dt=Math.abs(t.ts-(ct.exitTs||ct.entryTs))/60000;
      const score=dp+dt*0.25;
      if(score<bestScore){bestScore=score;best=t;}});
    if(!best){missing.push(ct);return;}
    used.add(best.tradeId);
    const ledgerPnl=recon[best.tradeId]&&recon[best.tradeId].pnl!=null?recon[best.tradeId].pnl:best.pnl;
    const delta=Math.round((ct.pnl-ledgerPnl)*100)/100;
    matches.push({csv:ct,trade:best,delta,status:Math.abs(delta)<=1?"confirmed":"adjusted"});});
  const csvDays=new Set(csvTrades.map(ct=>dateKeyOf(ct.exitTs||ct.entryTs)));
  const phantom=lts.filter(t=>csvDays.has(dateKeyOf(t.ts))&&!used.has(t.tradeId));
  return{matches,missing,phantom,
    confirmed:matches.filter(m=>m.status==="confirmed").length,
    adjusted:matches.filter(m=>m.status==="adjusted").length};
}
function reconEventsOf(rec,settings){
  const out=[];
  rec.matches.forEach(m=>{
    const risk=m.trade.entry&&m.trade.stop?Math.abs(m.trade.entry-m.trade.stop)*(m.trade.contracts||1)*settings.ptValue:0;
    out.push({ts:Date.now(),type:"TRADE_RECONCILED",data:{tradeId:m.trade.tradeId,pnl:m.csv.pnl,
      exit:m.csv.exit,fees:m.csv.fees,r:risk?Math.round(m.csv.pnl/risk*100)/100:null,
      confirmed:m.status==="confirmed",delta:m.delta}});});
  rec.missing.forEach((ct,i)=>{
    const tid=`imp${ct.exitTs||Date.now()}-${i}`;
    out.push({ts:ct.entryTs||ct.exitTs,type:"TRADE_OPENED",data:{tradeId:tid,dir:ct.dir,entry:ct.entry,
      stop:null,target:null,contracts:ct.size,quality:null,regime:null,imported:true}});
    out.push({ts:ct.exitTs||ct.entryTs,type:"TRADE_CLOSED",data:{tradeId:tid,dir:ct.dir,
      outcome:ct.pnl>0?"win":ct.pnl<0?"loss":"be",exit:ct.exit,pnl:ct.pnl,fees:ct.fees,
      r:settings.riskPerTrade?Math.round(ct.pnl/settings.riskPerTrade*100)/100:0,
      quality:null,regime:null,state:null,imported:true}});});
  rec.phantom.forEach(t=>out.push({ts:Date.now(),type:"TRADE_FLAGGED",
    data:{tradeId:t.tradeId,note:"Not found in broker CSV for this day — verify"}}));
  return out;
}

/* ════ THE NOTICING ENGINE — evidence-linked, sample-size honest ════ */
function bucketHour(ts){const h=new Date(ts).getHours()+new Date(ts).getMinutes()/60;
  return h<10?"Before 10:00":h<11.5?"10:00–11:30":"After 11:30";}
function insightsOf(ledger,settings){
  const trades=ledger.filter(e=>e.type==="TRADE_CLOSED").map(e=>({ts:e.ts,...e.data}));
  const out=[];const conf=n=>n>=10?"OBSERVED":n>=5?"EMERGING":"WATCHING";
  const wr=arr=>arr.length?Math.round(arr.filter(t=>t.outcome==="win").length/arr.length*100):0;
  const pnlSum=arr=>arr.reduce((s,t)=>s+(t.pnl||0),0);
  if(trades.length>=5){
    const base=wr(trades);
    // regime split
    REGIMES.forEach(r=>{const g=trades.filter(t=>t.regime===r.v);
      if(g.length>=5&&Math.abs(wr(g)-base)>=12)
        out.push({conf:conf(g.length),n:g.length,color:r.color,
          text:`${r.l} trades win ${wr(g)}% vs your ${base}% baseline (${money(pnlSum(g))} net).`});});
    // post-cooldown
    const pc=trades.filter(t=>t.postCooldown);
    if(pc.length>=5)out.push({conf:conf(pc.length),n:pc.length,color:C.loss,
      text:`Trades entered within 20 min of a cooldown ending win ${wr(pc)}% vs ${base}% baseline.`});
    // time of day
    const buckets={};trades.forEach(t=>{const b=bucketHour(t.ts);(buckets[b]=buckets[b]||[]).push(t);});
    Object.entries(buckets).forEach(([b,g])=>{if(g.length>=5&&pnlSum(g)<0&&wr(g)<base-10)
      out.push({conf:conf(g.length),n:g.length,color:C.warn,text:`${b}: ${wr(g)}% win rate, ${money(pnlSum(g))} net. Your worst window.`});});
    // day of week
    const dows={};trades.forEach(t=>{const d=DOW[new Date(t.ts).getDay()];(dows[d]=dows[d]||[]).push(t);});
    Object.entries(dows).forEach(([d,g])=>{if(g.length>=5&&wr(g)<=base-15)
      out.push({conf:conf(g.length),n:g.length,color:C.warn,text:`${d}s: ${wr(g)}% win rate across ${g.length} trades. Watch this day.`});});
    // quality split — expectancy honesty
    const hi=trades.filter(t=>(t.quality||0)>=settings.qualityFloor),lo=trades.filter(t=>(t.quality||0)<settings.qualityFloor);
    if(hi.length>=5&&lo.length>=3)
      out.push({conf:conf(Math.min(hi.length,lo.length)),n:trades.length,color:C.powderHi,
        text:`Gate-honest trades (Q≥${settings.qualityFloor}) win ${wr(hi)}%; sub-floor trades win ${wr(lo)}%. The floor is the edge.`});
  }
  if(trades.length>=5){
    const base=wr(trades);
    const fs=trades.filter(t=>t.fullStack===true),nf=trades.filter(t=>t.fullStack===false);
    if(fs.length>=5&&nf.length>=3&&wr(fs)-wr(nf)>=10)
      out.push({conf:conf(fs.length),n:fs.length,color:C.win,
        text:`Full-stack entries win ${wr(fs)}% vs ${wr(nf)}% when the opens disagree. The stack is the filter.`});
    const wins={};trades.forEach(t=>{if(t.window)(wins[t.window]=wins[t.window]||[]).push(t);});
    Object.entries(wins).forEach(([w,g])=>{if(g.length>=5&&wr(g)<=base-12)
      out.push({conf:conf(g.length),n:g.length,color:C.warn,
        text:`${w}-window entries win ${wr(g)}% vs ${base}% baseline — the clock is telling you something.`});});
    const el=trades.filter(t=>t.alignTier==="ELITE"||t.alignTier==="HIGH");
    const lo2=trades.filter(t=>t.alignTier==="MODERATE"||t.alignTier==="LOW");
    if(el.length>=5&&lo2.length>=3&&wr(el)-wr(lo2)>=10)
      out.push({conf:conf(el.length),n:el.length,color:C.win,
        text:`ELITE/HIGH continuity entries win ${wr(el)}% vs ${wr(lo2)}% on partial alignment. The HTF ladder is the probability.`});
    const forced=ledger.filter(e=>e.type==="GATE_FORCED").length;
    if(forced>=3)out.push({conf:conf(forced),n:forced,color:C.loss,
      text:`${forced} gates opened against a STAND DOWN verdict. Every one is on the record.`});
  }
  const passes=ledger.filter(e=>e.type==="DECISION"&&e.data.action==="PASS").length;
  if(passes>=5)out.push({conf:conf(passes),n:passes,color:C.win,
    text:`${passes} recorded passes — ${money(passes*settings.riskPerTrade)} of capital deliberately kept off the table.`});
  return out;
}
function reviewStatsOf(ledger,settings){
  const trades=ledger.filter(e=>e.type==="TRADE_CLOSED").map(e=>({ts:e.ts,...e.data}));
  const wins=trades.filter(t=>t.outcome==="win"),losses=trades.filter(t=>t.outcome==="loss");
  const pnl=trades.reduce((s,t)=>s+(t.pnl||0),0);
  const passes=ledger.filter(e=>e.type==="DECISION"&&e.data.action==="PASS").length;
  const takes=ledger.filter(e=>e.type==="DECISION"&&e.data.action==="TAKE").length;
  const avgR=trades.length?trades.reduce((s,t)=>s+(t.r||0),0)/trades.length:0;
  const hi=trades.filter(t=>(t.quality||0)>=settings.qualityFloor);
  const avgRHi=hi.length?hi.reduce((s,t)=>s+(t.r||0),0)/hi.length:0;
  const overrides=ledger.filter(e=>e.type==="BREAKER_OVERRIDE").length;
  return{trades,n:trades.length,wins:wins.length,losses:losses.length,
    winRate:trades.length?Math.round(wins.length/trades.length*100):0,pnl,passes,takes,
    avgR,avgRHi,nHi:hi.length,overrides,riskAvoided:passes*settings.riskPerTrade};
}

  const liveR=mark?((parseFloat(mark)-t.entry)*(t.dir==="long"?1:-1)*t.contracts*settings.ptValue)/(risk||1):null;

  return(<div style={{animation:"rise .35s ease both"}}>

            textShadow:liveR===null?"none":`0 0 22px ${(liveR>=0?C.win:C.loss)}55`}}>

          color:g.dirBias===t.dir?C.win:C.warn}}>
          {g.label} @ {g.mark} — {g.dirBias===t.dir?"WITH YOU":"AGAINST THE POSITION"}</div>):null;})()}
      {brief.regime==="pos"&&(<div style={{fontFamily:mono,fontSize:9.5,color:C.warn,border:`1px solid ${C.warn}44`,
        background:`${C.warn}0D`,borderRadius:8,padding:"8px 10px",marginBottom:12,letterSpacing:"0.04em"}}>
        ⚠ POS GEX — MOVES FADE. THE OPEN IS A MAGNET.</div>)}
      <div style={{borderTop:`1px dashed ${C.border}`,paddingTop:14}}>
        <Eyebrow>CLOSE + STAMP</Eyebrow>

          <Field label="EXIT PRICE"><Input numeric value={exit} onChange={setExit} placeholder="fill"/></Field>
        </div>
        <div style={{fontFamily:mono,fontSize:9,color:C.dim,letterSpacing:"0.14em",marginBottom:7}}>STATE — ONE TAP</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {STATES.map(x=>(<Pill key={x.v} sm color={C.ice} active={state===x.v} onClick={()=>setStateTap(x.v)}>{x.l}</Pill>))}
        </div>

/* ════ LEDGER — full decision history, grouped by day ════ */
function LedgerMode({ledger}){
  const days=useMemo(()=>{
    const g={};ledger.forEach(e=>{const k=dateKeyOf(e.ts);(g[k]=g[k]||[]).push(e);});
    return Object.keys(g).sort((a,b)=>b.localeCompare(a)).map(k=>{
      const evs=g[k],trades=closedTradesOf(evs);
      return{k,evs,trades,pnl:trades.reduce((s,t)=>s+(t.pnl||0),0),
        takes:decisionsOf(evs).filter(d=>d.action==="TAKE").length,
        passes:decisionsOf(evs).filter(d=>d.action==="PASS").length};});
  },[ledger]);
  const [open,setOpen]=useState(days.length?days[0].k:null);
  if(!days.length)return(<Panel style={{textAlign:"center",padding:"40px 20px"}}>
    <div style={{fontFamily:mono,fontSize:11,color:C.dim,letterSpacing:"0.1em"}}>THE LEDGER IS EMPTY — YOUR FIRST BRIEF STARTS IT</div></Panel>);
  return(<div>
    {days.map(d=>(<Panel key={d.k} style={{padding:"12px 14px"}}>
      <button onClick={()=>setOpen(open===d.k?null:d.k)} style={{width:"100%",background:"transparent",border:"none",
        cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8,padding:0}}>
        <span style={{fontFamily:disp,fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:d.k===todayKey()?C.bolt:C.textDim}}>
          {d.k===todayKey()?"TODAY":fmtD(d.k).toUpperCase()}</span>
        <span style={{fontFamily:mono,fontSize:10,color:C.muted}}>
          {d.trades.length} TRD · {d.passes} PASS · <b style={{color:d.pnl>=0?C.win:C.loss}}>{money(d.pnl)}</b> {open===d.k?"▾":"▸"}</span>
      </button>
      {open===d.k&&<div style={{marginTop:10}}><TodayStream ds={{evs:d.evs}}/></div>}
    </Panel>))}
  </div>);
}

    const built=buildTradesFromCsv(txt,settings);
    if(built.mode==="unknown"||built.mode==="empty"){setRec(null);setMeta({error:true,...built});return;}
    setMeta(built);setRec(reconcileCsv(ledger,built.trades,settings));setApplied(false);};
  return(<Panel accent={C.ice}>
    <Eyebrow color={C.ice}>BROKER SYNC — TOPSTEPX CSV → CALIBRATED TRUTH</Eyebrow>

      onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();

/* ════ DEMO SEED — ~6 weeks of plausible ledger history ════ */
function seedDemo(settings){
  const out=[];let day=new Date();day.setHours(9,0,0,0);
  const rand=(a,b)=>a+Math.random()*(b-a);
  for(let d=42;d>=1;d--){
    const dt=new Date(day.getTime()-d*86400000);if(dt.getDay()===0||dt.getDay()===6)continue;
    const base=dt.getTime();const regime=Math.random()<0.5?"neg":Math.random()<0.6?"pos":"flip";
    const dir=Math.random()<0.5?"short":"long";
    const tdo=21800+Math.floor(rand(-60,60));
    out.push({ts:base,type:"BRIEF_SEALED",data:{regime,direction:dir,maxTrades:2,maxLoss:settings.maxDailyLoss,
      fourHClear:regime!=="flip",weeklyAligned:Math.random()<0.7,
      declaration:`${dir.toUpperCase()}S only. Two max. ${dir==="short"?"Premium above the opens":"Discount below the opens"} — wait for the sweep.`,
      spyFlip:"687",spyPut:"680",spyCall:"695",spySpot:"685",
      tmo:String(tdo-80),tdo:String(tdo),two:String(tdo-30),spot:String(tdo+(dir==="short"?25:-25))}});
    out.push({ts:base+35*60000,type:"NYO_SET",data:{price:String(tdo+(dir==="short"?12:-12))}});
    const nGates=1+Math.floor(Math.random()*3);let t=base+30*60000;let losses=0;
    for(let g=0;g<nGates;g++){
      const gid=`g${base}-${g}`;out.push({ts:t,type:"GATE_OPEN",data:{gateId:gid}});t+=rand(4,15)*60000;
      const pass=Math.random()<0.35;const q=pass?5+Math.floor(rand(0,3)):regime==="neg"?8+Math.floor(rand(0,3)):7+Math.floor(rand(0,2));
      if(pass){out.push({ts:t,type:"DECISION",data:{gateId:gid,action:"PASS",reason:PASS_REASONS[Math.floor(rand(0,PASS_REASONS.length))],quality:q}});t+=rand(20,60)*60000;continue;}
      const winP=(regime==="neg"?0.62:regime==="pos"?0.42:0.3)*(q>=settings.qualityFloor?1:0.7);
      const win=Math.random()<winP;
      const stopPts=20,cts=Math.floor(settings.riskPerTrade/(stopPts*settings.ptValue));
      const risk=cts*stopPts*settings.ptValue;
      const pnl=win?risk*rand(1.6,2.1):-risk*rand(0.9,1.05);
      const tid=`t${base}-${g}`;const entry=tdo+(dir==="short"?Math.floor(rand(10,50)):-Math.floor(rand(10,50)));
      const wv=dir==="long"?"2u":"2d",av=dir==="long"?"2d":"2u";
      const leanW=dir==="long"?"1g":"1r",leanA=dir==="long"?"1r":"1g";
      const nAl=win?(Math.random()<0.6?6:5):(Math.random()<0.5?4:5);
      const frames=["h1","h4","d","w","m","q"];const tfcSeed={};
      frames.forEach((f,ix)=>{
        if(ix<nAl)tfcSeed[f]=wv;
        else tfcSeed[f]=Math.random()<0.4?leanW:Math.random()<0.5?av:leanA;});
      const eff=Object.values(tfcSeed).reduce((s,v)=>s+(v===wv?1:v===leanW?0.5:0),0);
      out.push({ts:t-60000,type:"STAGE_ARMED",data:{gateId:gid,stage:"tfc",opt:"seeded",tfc:tfcSeed,
        tier:eff>=5.5?"ELITE":eff>=4.5?"HIGH":eff>=3?"MODERATE":"LOW"}});
      out.push({ts:t,type:"DECISION",data:{gateId:gid,action:"TAKE",quality:q}});
      out.push({ts:t+2000,type:"TRADE_OPENED",data:{tradeId:tid,gateId:gid,dir,entry,stop:dir==="long"?entry-stopPts:entry+stopPts,
        target:dir==="long"?entry+2*stopPts:entry-2*stopPts,contracts:cts,quality:q,regime}});
      t+=rand(12,45)*60000;
      out.push({ts:t,type:"TRADE_CLOSED",data:{tradeId:tid,dir,outcome:win?"win":"loss",pnl:Math.round(pnl),
        r:pnl/risk,quality:q,regime,exit:entry+(pnl/(cts*settings.ptValue))*(dir==="long"?1:-1),
        state:win?"calm":Math.random()<0.4?"tilted":"rushed",gaugeAligned:true,
        fullStack:Math.random()<0.6,alignTier:nAl===6?"ELITE":nAl===5?"HIGH":"MODERATE",
        window:["PRIME","SWEEP","PM DRIVE","CHOP"][Math.floor(rand(0,win?2.2:4))],
        postCooldown:losses>0&&Math.random()<0.5}});
      if(!win){losses++;out.push({ts:t+1000,type:"COOLDOWN_START",data:{note:"Loss logged"}});t+=COOLDOWN_MS;}
      if(losses>=2)break;t+=rand(20,70)*60000;
    }
    out.push({ts:base+7.5*3600000,type:"DEBRIEF_SIGNED",data:{followed:Math.random()<0.8,improvement:"Wait for the actual sweep, not the almost-sweep."}});
    if(Math.random()<0.7){
      const tg={};DAILY_TOGGLES.forEach(x=>{tg[x.k]=Math.random()<0.75;});
      out.push({ts:base+8*3600000,type:"REFLECTION_SIGNED",data:{dateKey:dateKeyOf(base),toggles:tg,
        note:"Honest day. The gauge kept me out of one bad long in premium.",ts:base+8*3600000}});
    }
  }
  // last week's signed weekly review
  const lastWeek=weekBoundsOf(-1);
  const wt={};WEEKLY_TOGGLES.forEach(x=>{wt[x.k]=Math.random()<0.7;});
  out.push({ts:Date.now()-3*86400000,type:"WEEKLY_REVIEW_SIGNED",data:{weekKey:lastWeek.weekKey,toggles:wt,note:"Patience improving. Sizing stays."}});
  // this week's econ landmines
  const wb=weekBoundsOf(0);
  [["FOMC",2,"14:00","high"],["CPI",3,"8:30","high"],["Jobless Claims",3,"8:30","med"],["PPI",4,"8:30","med"]]
    .forEach(([name,ix,time,impact],i)=>{if(wb.days[ix])out.push({ts:Date.now()-i,type:"ECON_ADD",
      data:{id:`ec-seed-${i}`,name,dateKey:wb.days[ix],time,impact}});});
  // today's level board
  const tk=todayKey();const now=new Date();now.setHours(8,45,0,0);
  [["eqh","21924","Asia equal highs — sweep target"],["ob","21884","4H bearish OB"],
   ["fvg","21852","15M FVG"],["eql","21796","London equal lows"]].forEach(([type,price,note],i)=>{
    out.push({ts:now.getTime()+i,type:"LEVEL_ADD",data:{id:`lv-seed-${i}`,type,price,note}});});
  return out.sort((a,b)=>a.ts-b.ts);
}

/* ════ APP — the operating system shell ════ */
function EdgeOS(){
  const [ledger,setLedger]=useState([]);
  const [settings,setSettings]=useState(loadSettings());
  const [nav,setNav]=useState("mission"); // mission | market | review | system
  const [forceDebrief,setForceDebrief]=useState(false);
  const [clock,setClock]=useState(new Date());
  const [toast,setToast]=useState("");
  useEffect(()=>{setLedger(loadLedger());},[]);
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t);},[]);
  const flash=m=>{setToast(m);setTimeout(()=>setToast(""),2400);};
  const append=(type,data)=>{setLedger(prev=>{const next=[...prev,{ts:Date.now(),type,data:data||{}}];saveLedger(next);return next;});};

  const ds=useMemo(()=>dayStateOf(ledger,settings),[ledger,settings,clock.getMinutes()]);
  const baseMode=modeOf(ds);
  const mode=baseMode==="HUNT"&&forceDebrief?"DEBRIEF":baseMode;
  useEffect(()=>{
    if(ds.tripped&&!ds.evs.some(e=>e.type==="BREAKER_TRIP"))append("BREAKER_TRIP",{reason:ds.reasons[0]||""});
  },[ds.tripped]);

  /* actions */
  const seal=b=>{append("BRIEF_SEALED",b);flash("Contract sealed — immutable until tomorrow");};
  const openGate=forced=>{
    if(forced)append("GATE_FORCED",{note:"Opened against STAND DOWN",verdict:ds.verdict?ds.verdict.label:""});
    append("GATE_OPEN",{gateId:`g${Date.now()}`,forced:!!forced});};
  const arm=p=>{if(ds.gate)append("STAGE_ARMED",{gateId:ds.gate.gateId,...p});};
  const decide=(action,extra)=>{
    if(!ds.gate)return;
    append("DECISION",{gateId:ds.gate.gateId,action,...extra});
    if(action==="TAKE"){
      const plan=extra.plan;
      const g=pdGauge(plan.entry,ds.brief.tdo,ds.brief.two);
      append("TRADE_OPENED",{tradeId:`t${Date.now()}`,gateId:ds.gate.gateId,dir:plan.dir,
        entry:parseFloat(plan.entry),stop:parseFloat(plan.stop),target:parseFloat(plan.target),
        contracts:plan.contracts,quality:extra.quality,regime:ds.brief.regime,
        gaugeAligned:g&&g.dirBias?g.dirBias===plan.dir:null,
        fullStack:ds.stack?!!ds.stack.full:null,window:ds.qt?ds.qt.window:null,
        alignTier:ds.gate&&ds.gate.stages.tfc?ds.gate.stages.tfc.tier:null});
      flash("Entry stamped — manage the R");
    }else flash(action==="PASS"?"Pass logged — discipline recorded":"Gate expired — logged");
  };
  const closeTrade=({exit,state})=>{
    const t=ds.openTrade;if(!t)return;
    const risk=Math.abs(t.entry-t.stop)*t.contracts*settings.ptValue;
    const pnl=Math.round((exit-t.entry)*(t.dir==="long"?1:-1)*t.contracts*settings.ptValue);
    const outcome=pnl>0?"win":pnl<0?"loss":"be";
    const postCooldown=ds.cooldownUntil>0&&(Date.now()-ds.cooldownUntil)<20*60000&&Date.now()>ds.cooldownUntil;
    append("TRADE_CLOSED",{tradeId:t.tradeId,dir:t.dir,outcome,exit,pnl,r:risk?pnl/risk:0,
      quality:t.quality,regime:t.regime,state,postCooldown,gaugeAligned:t.gaugeAligned,
      fullStack:t.fullStack,window:t.window,alignTier:t.alignTier,durationMs:Date.now()-t.openedAt});
    append("STATE_CHECK",{state});
    if(outcome==="loss")append("COOLDOWN_START",{note:"Loss logged — 15-minute break"});
    flash(`${outcome.toUpperCase()} · ${money(pnl)} stamped`);
  };
  const reviewLoss=(tradeId,verdict)=>append("LOSS_REVIEWED",{tradeId,verdict,note:verdict==="valid"?"Valid setup — variance":"Deviation"});
  const override=()=>{append("BREAKER_OVERRIDE",{note:OVERRIDE_SENTENCE});flash("Override logged to your permanent record");};
  const sign=d=>{append("DEBRIEF_SIGNED",d);setForceDebrief(false);flash("Debrief signed");};
  const addLevel=l=>{append("LEVEL_ADD",{id:`lv${Date.now()}`,...l});flash("Level added to the board");};
  const removeLevel=id=>append("LEVEL_REMOVE",{id});
  const setMark=p=>{append("MARK_SET",{price:p});flash(`Mark set — ${p}`);};
  const setNyo=p=>{append("NYO_SET",{price:p});flash(`NY open stamped — ${p}`);};
  const addEcon=e=>{append("ECON_ADD",{id:`ec${Date.now()}`,...e});flash("Event added — the mission will watch it");};
  const removeEcon=id=>append("ECON_REMOVE",{id});
  const signReflection=d=>{append("REFLECTION_SIGNED",d);flash("Reflection signed — on the record");};
  const signPeriod=(type,d)=>{append(type,d);flash("Signed — on the record");};
  const exportAll=()=>{const blob=new Blob([JSON.stringify({ledger,settings,exported:Date.now()},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`edgeos-ledger-${todayKey()}.json`;a.click();URL.revokeObjectURL(url);flash("Ledger exported");};
  const importAll=txt=>{try{const d=JSON.parse(txt);
    if(d.ledger){setLedger(d.ledger);saveLedger(d.ledger);}
    if(d.settings){setSettings({...loadSettings(),...d.settings});saveSettings({...loadSettings(),...d.settings});}
    flash("Ledger imported");}catch(_){flash("Import failed — invalid file");}};
  const demo=()=>{const seeded=seedDemo(settings);setLedger(seeded);saveLedger(seeded);flash("Demo sessions loaded");};
  const applyRecon=evts=>{setLedger(prev=>{const next=[...prev,...evts].sort((a,b)=>a.ts-b.ts);
    saveLedger(next);return next;});flash(`Broker sync applied — ${evts.length} event${evts.length===1?"":"s"} written`);};
  const wipe=()=>{setLedger([]);saveLedger([]);flash("Ledger wiped");};

  const NAV=[{id:"mission",l:"MISSION",icon:"◆"},{id:"market",l:"MARKET",icon:"≡"},
    {id:"review",l:"LEARN",icon:"◈"},{id:"system",l:"SYSTEM",icon:"⚙"}];
  const modeColor=mode==="LOCKOUT"?C.loss:mode==="EXECUTE"?(ds.openTrade&&ds.openTrade.dir==="long"?C.win:C.loss):mode==="BRIEF"?C.bolt:C.powderHi;
  return(<div style={{minHeight:"100vh",color:C.text,fontFamily:sans,maxWidth:780,margin:"0 auto",
    padding:"max(16px,env(safe-area-inset-top)) 14px calc(84px + env(safe-area-inset-bottom))"}}>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
          <Bolt size={15} glow/><span style={{fontFamily:mono,fontSize:9.5,color:C.bolt,letterSpacing:"0.3em"}}>EDGE OS</span>
        </div>
        <h1 style={{fontFamily:disp,fontWeight:700,fontSize:24,letterSpacing:"0.1em",lineHeight:1,margin:0,
          color:C.white,textShadow:`0 0 30px ${modeColor}44`}}>
          {nav==="market"?"PERCEPTION":nav==="review"?"LEARNING":nav==="system"?"SYSTEM":MODE_LABEL[mode]||mode}</h1>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:mono,fontSize:15,color:C.textDim}}>{clock.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</div>
        <div style={{display:"flex",gap:5,alignItems:"center",justifyContent:"flex-end",marginTop:3}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:C.powderHi,animation:"pulse 2s infinite"}}/>
          <span style={{fontFamily:mono,fontSize:9,color:`${C.powderHi}88`}}>LOCAL · OFFLINE-READY</span></div></div>
    </div>
    <LoopStrip phase={loopPhaseOf(nav,mode)}/>
    <Ribbon ds={ds} mode={mode}/>
    {/* MISSION — the auto-routed mode machine */}
    {nav==="mission"&&mode==="BRIEF"&&<BriefMode settings={settings} prefill={lastOpensPrefill(ledger)} onSeal={seal}/>}
    {nav==="mission"&&mode==="HUNT"&&<HuntMode ds={ds} settings={settings} clock={clock}
      onOpenGate={openGate} onArm={arm} onArmPlan={arm} onDecide={decide} onEndSession={()=>setForceDebrief(true)}/>}
    {nav==="mission"&&mode==="EXECUTE"&&<ExecuteMode ds={ds} settings={settings} onClose={closeTrade}/>}
    {nav==="mission"&&mode==="DEBRIEF"&&<DebriefMode ds={ds} onSign={sign} onBack={()=>setForceDebrief(false)}/>}
    {nav==="market"&&<MarketMode ds={ds} ledger={ledger} onAddLevel={addLevel} onRemoveLevel={removeLevel}
      onSetMark={setMark} onSetNyo={setNyo} onAddEcon={addEcon} onRemoveEcon={removeEcon}/>}
    {nav==="review"&&<ReviewMode ledger={ledger} settings={settings} ds={ds}
      onSignReflection={signReflection} onSignPeriod={signPeriod}/>}
    {nav==="system"&&<SystemMode ledger={ledger} settings={settings} onSave={s=>{setSettings(s);saveSettings(s);flash("Parameters saved");}}
      onExport={exportAll} onImport={importAll} onSeedDemo={demo} onWipe={wipe} onApplyRecon={applyRecon}/>}
    {/* LOCKOUT overlays everything */}
    {mode==="LOCKOUT"&&<LockoutMode ds={ds} onReviewLoss={reviewLoss} onOverride={override}
      onDebrief={()=>{setNav("mission");setForceDebrief(true);append("BREAKER_OVERRIDE",{note:"debrief-only unlock"});}}/>}
    {/* Toast */}
    {toast&&(<div style={{position:"fixed",bottom:"calc(94px + env(safe-area-inset-bottom))",left:"50%",transform:"translateX(-50%)",
      background:C.panel2,border:`1px solid ${C.bolt}55`,color:C.bolt,fontFamily:mono,fontSize:12,
      padding:"10px 18px",borderRadius:999,zIndex:120,boxShadow:`0 8px 30px #000A,0 0 20px ${C.bolt}22`,whiteSpace:"nowrap"}}>{toast}</div>)}
    {/* Dock */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:110,
      background:`${C.bg2}F0`,borderTop:`1px solid ${C.border}`,backdropFilter:"blur(14px)",
      padding:"9px 8px calc(9px + env(safe-area-inset-bottom))"}}>
      <div style={{display:"flex",justifyContent:"space-around",maxWidth:780,margin:"0 auto"}}>
        {NAV.map(n=>(<button key={n.id} onClick={()=>setNav(n.id)} style={{background:"transparent",border:"none",
          cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 10px"}}>
          <span style={{fontSize:17,lineHeight:1,color:nav===n.id?C.bolt:C.dim,
            textShadow:nav===n.id?`0 0 14px ${C.bolt}77`:"none"}}>{n.icon}</span>
          <span style={{fontFamily:mono,fontSize:8.5,letterSpacing:"0.1em",color:nav===n.id?C.bolt:C.dim}}>{n.l}</span></button>))}
      </div></div>
  </div>);
}

          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
            'color:#E7F1FB;font-family:-apple-system,sans-serif;padding:32px;text-align:center;">' +
            '<div><div style="font-size:13px;letter-spacing:.18em;color:#FFC20E;margin-bottom:14px;">' +
            '\u26A1 EDGE OS COULD NOT LOAD</div>' +
            '<div style="font-size:13px;color:#6C8BAC;line-height:1.6;max-width:380px;">Still missing after 30s: ' +
            '<b style="color:#FF4D5E;">' + missing.join(", ") + "</b>. Usually a slow connection to unpkg.com. " +
            'Check your internet and reload.</div>' +
            '<div style="margin-top:18px;"><button onclick="location.reload()" style="background:#FFC20E;' +
            'color:#04101F;border:none;border-radius:8px;padding:10px 22px;font-weight:700;' +
            'font-family:monospace;font-size:12px;cursor:pointer;">RELOAD</button></div></div></div>';
        }
      }
    }
    (function showLoading() {
      var root = document.getElementById("root");
      if (root && root.children.length === 0) {
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
          'color:#3B587A;font-family:monospace;font-size:11px;letter-spacing:.16em;">' +
          '\u26A1 BOOTING EDGE OS\u2026</div>';
      }
    })();
    window.__edgeosBootTimer = setTimeout(function(){}, 0);
    waitForLibs();
  })();
</script>
